<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volitional - 聊天记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px 24px 12px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; }
        .header .meta { color: #888; font-size: 12px; }
        .back-btn { background: #0f3460; color: #eee; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .back-btn:hover { background: #1a4a7a; }
        .content { flex: 1; overflow-y: auto; padding: 16px 24px; }
        .list-group { margin-bottom: 20px; }
        .list-group-title { font-size: 12px; color: #888; margin-bottom: 8px; padding-left: 4px; }
        .conv-card { background: #16213e; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid #0f3460; transition: border-color .2s; }
        .conv-card:hover { border-left-color: #00b894; }
        .conv-card .conv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .conv-card .conv-title { font-size: 14px; font-weight: 600; }
        .conv-card .conv-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-right: 6px; }
        .badge-group { background: #0984e333; color: #74b9ff; }
        .badge-private { background: #6c5ce733; color: #a29bfe; }
        .conv-card .conv-sub { font-size: 12px; color: #888; }
        .conv-card .count { font-size: 11px; color: #636e72; }
        .empty { text-align: center; color: #636e72; padding: 40px; }
        .error { color: #e17055; text-align: center; padding: 20px; }

        .msg-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
        .msg-item { display: flex; flex-direction: column; max-width: 80%; }
        .msg-item.user { align-self: flex-end; align-items: flex-end; }
        .msg-item.assistant { align-self: flex-start; align-items: flex-start; }
        .msg-sender { font-size: 11px; color: #888; margin-bottom: 2px; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
        .msg-item.user .msg-bubble { background: #0984e3; color: #fff; border-bottom-right-radius: 4px; }
        .msg-item.assistant .msg-bubble { background: #2d3436; color: #dfe6e9; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; color: #636e72; margin-top: 4px; }

        .float-btns { position: fixed; right: 20px; bottom: 100px; display: flex; flex-direction: column; gap: 8px; z-index: 99; }
        .float-btns button { width: 36px; height: 36px; border-radius: 50%; background: #0f3460; color: #eee; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; opacity: 0.7; }
        .float-btns button:hover { opacity: 1; }
        #viewDetail { display: none; }
    </style>
</head>
<body>
    <div class="header" id="viewList">
        <h1>💬 聊天记录</h1>
        <span class="meta" id="listMeta">加载中...</span>
    </div>
    <div class="header" id="viewDetail">
        <div id="detailHeaderLeft"></div>
        <div>
            <h1 id="detailTitle">聊天详情</h1>
            <span class="meta" id="detailMeta"></span>
        </div>
    </div>
    <div class="content" id="contentView"></div>
</body>
<script>
(function() {
    function esc(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function showList() {
        document.getElementById('viewList').style.display = 'flex';
        document.getElementById('viewDetail').style.display = 'none';
        // Remove dynamic float buttons from body
        var oldBtns = document.querySelectorAll('.float-btn-dynamic');
        for (var i = 0; i < oldBtns.length; i++) {
            oldBtns[i].parentNode.removeChild(oldBtns[i]);
        }
    }

    function showDetail(convId) {
        document.getElementById('viewList').style.display = 'none';
        document.getElementById('viewDetail').style.display = 'flex';

        // Create float buttons dynamically on body (createElement required per experience.md)
        var btnTop = document.createElement('button');
        btnTop.className = 'float-btn-dynamic';
        btnTop.style.cssText = 'position:fixed;right:20px;bottom:140px;z-index:99;width:36px;height:36px;border-radius:50%;background:#0f3460;color:#eee;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0.7;';
        btnTop.textContent = '↑';
        btnTop.addEventListener('click', scrollToTop);
        document.body.appendChild(btnTop);

        var btnBottom = document.createElement('button');
        btnBottom.className = 'float-btn-dynamic';
        btnBottom.style.cssText = 'position:fixed;right:20px;bottom:100px;z-index:99;width:36px;height:36px;border-radius:50%;background:#0f3460;color:#eee;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0.7;';
        btnBottom.textContent = '↓';
        btnBottom.addEventListener('click', scrollToBottom);
        document.body.appendChild(btnBottom);

        loadDetail(convId);
    }

    function formatTime(t) {
        if (!t) return '';
        if (t.length === 19) return t.substring(5, 16).replace('T', ' ');
        return t;
    }

    function renderList(convs) {
        document.getElementById('listMeta').textContent = '共 ' + convs.length + ' 个对话';
        var container = document.getElementById('contentView');
        while (container.firstChild) container.removeChild(container.firstChild);

        if (!convs || convs.length === 0) {
            var emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty';
            emptyDiv.textContent = '暂无对话记录';
            container.appendChild(emptyDiv);
            return;
        }

        var currentType = '';
        convs.forEach(function(c) {
            var typeLabel = c.chat_type === '群聊' ? '群聊' : (c.chat_type === '私聊' ? '私聊' : '其他');
            var badgeCls = c.chat_type === '群聊' ? 'badge-group' : (c.chat_type === '私聊' ? 'badge-private' : '');

            if (typeLabel !== currentType) {
                currentType = typeLabel;
                var groupTitle = document.createElement('div');
                groupTitle.className = 'list-group-title';
                groupTitle.textContent = typeLabel;
                container.appendChild(groupTitle);
            }

            var card = document.createElement('div');
            card.className = 'conv-card';

            var header = document.createElement('div');
            header.className = 'conv-header';

            var title = document.createElement('span');
            title.className = 'conv-title';

            var badge = document.createElement('span');
            badge.className = 'conv-badge ' + badgeCls;
            badge.textContent = typeLabel;
            title.appendChild(badge);

            var chatIdSpan = document.createElement('span');
            chatIdSpan.textContent = c.chat_id;
            title.appendChild(chatIdSpan);

            header.appendChild(title);

            var count = document.createElement('span');
            count.className = 'count';
            count.textContent = c.msg_count + ' 条消息';
            header.appendChild(count);

            card.appendChild(header);

            var sub = document.createElement('div');
            sub.className = 'conv-sub';
            sub.textContent = '更新于 ' + formatTime(c.updated_at);
            card.appendChild(sub);

            (function(convId) {
                card.addEventListener('click', function() {
                    showDetail(convId);
                });
            })(c.conv_id);

            container.appendChild(card);
        });
    }

    function parseMediaTags(content) {
        // 检测 <<IMG>> 或 <<VID>> 标记（base64 已拆分到 media_base64 列，按需加载）
        var parts = [];
        var re = /<<(IMG|VID)>>/g;
        var lastIdx = 0;
        var match;
        while ((match = re.exec(content)) !== null) {
            if (match.index > lastIdx) {
                parts.push({type: 'text', text: content.substring(lastIdx, match.index)});
            }
            parts.push({type: match[1] === 'IMG' ? 'image' : 'video'});
            lastIdx = match.index + match[0].length;
        }
        if (lastIdx < content.length) {
            parts.push({type: 'text', text: content.substring(lastIdx)});
        }
        return parts.length > 0 ? parts : [{type: 'text', text: content}];
    }

    function renderDetail(data) {
        var chatTypeBadge = document.createElement('span');
        if (data.chat_type === '群聊') {
            chatTypeBadge.className = 'conv-badge badge-group';
            chatTypeBadge.textContent = '群聊';
        } else if (data.chat_type === '私聊') {
            chatTypeBadge.className = 'conv-badge badge-private';
            chatTypeBadge.textContent = '私聊';
        }
        var detailTitle = document.getElementById('detailTitle');
        while (detailTitle.firstChild) detailTitle.removeChild(detailTitle.firstChild);
        detailTitle.appendChild(chatTypeBadge);
        detailTitle.appendChild(document.createTextNode(data.chat_id || ''));

        var total = data.total || data.messages.length;
        document.getElementById('detailMeta').textContent = '共 ' + total + ' 条消息' + (total > data.messages.length ? '（已加载最近 ' + data.messages.length + ' 条）' : '');

        var container = document.getElementById('contentView');
        while (container.firstChild) container.removeChild(container.firstChild);
        var msgList = document.createElement('div');
        msgList.className = 'msg-list';

        data.messages.forEach(function(m) {
            var roleCls = m.role === 'assistant' ? 'assistant' : 'user';
            var displayName = m.sender_name || (m.role === 'assistant' ? '机器人' : '用户');

            var item = document.createElement('div');
            item.className = 'msg-item ' + roleCls;

            var sender = document.createElement('span');
            sender.className = 'msg-sender';
            sender.textContent = displayName;
            item.appendChild(sender);

            var bubble = document.createElement('div');
            bubble.className = 'msg-bubble';

            var parts = parseMediaTags(m.content || '');
            parts.forEach(function(p) {
                if (p.type === 'text') {
                    bubble.appendChild(document.createTextNode(p.text));
                } else {
                    var link = document.createElement('span');
                    link.style.cssText = 'color:#74b9ff;cursor:pointer;text-decoration:underline;';
                    link.textContent = p.type === 'image' ? '[点击查看图片]' : '[点击查看视频]';

                    var mediaNode = document.createElement(p.type === 'image' ? 'img' : 'video');
                    mediaNode.style.cssText = 'max-width:100%;max-height:300px;border-radius:6px;margin-top:4px;display:none;';
                    if (p.type === 'video') {
                        mediaNode.controls = true;
                    }

                    (function(msgId, mediaType, node, lnk) {
                        lnk.addEventListener('click', function() {
                            if (node.style.display === 'none') {
                                // 点击时从 API 按需加载 base64，不在列表查询中传输
                                if (!node.src) {
                                    lnk.textContent = '加载中...';
                                    AstrBotPluginPage.apiGet('/message_media', { id: msgId }).then(function(resp) {
                                        if (resp && resp.media) {
                                            node.src = resp.media;
                                        }
                                        node.style.display = 'block';
                                        lnk.textContent = mediaType === 'image' ? '[收起图片]' : '[收起视频]';
                                    }).catch(function() {
                                        node.style.display = 'block';
                                        lnk.textContent = mediaType === 'image' ? '[收起图片]' : '[收起视频]';
                                    });
                                } else {
                                    node.style.display = 'block';
                                    lnk.textContent = mediaType === 'image' ? '[收起图片]' : '[收起视频]';
                                }
                            } else {
                                node.style.display = 'none';
                                lnk.textContent = mediaType === 'image' ? '[点击查看图片]' : '[点击查看视频]';
                            }
                        });
                    })(m.id, p.type, mediaNode, link);

                    bubble.appendChild(link);
                    bubble.appendChild(mediaNode);
                }
            });
            item.appendChild(bubble);

            var timeSpan = document.createElement('span');
            timeSpan.className = 'msg-time';
            timeSpan.textContent = formatTime(m.time) || '';
            item.appendChild(timeSpan);
            msgList.appendChild(item);
        });

        container.appendChild(msgList);
        scrollToBottom();
    }

    function scrollToTop() {
        document.getElementById('contentView').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollToBottom() {
        var el = document.getElementById('contentView');
        el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
    }

    function loadList() {
        document.getElementById('listMeta').textContent = '加载中...';
        AstrBotPluginPage.apiGet('/conversations').then(function(resp) {
            if (!resp || !resp.conversations) {
                document.getElementById('contentView').innerHTML = '<div class="empty">暂无对话记录</div>';
                document.getElementById('listMeta').textContent = '';
                return;
            }
            renderList(resp.conversations);
        }).catch(function(e) {
            document.getElementById('contentView').innerHTML = '<div class="error">加载失败: ' + esc(String(e)) + '</div>';
        });
    }

    function loadDetail(convId) {
        document.getElementById('contentView').innerHTML = '<div class="empty">加载中...</div>';
        AstrBotPluginPage.apiGet('/messages_detail', { conv_id: convId }).then(function(resp) {
            if (!resp || !resp.messages || resp.messages.length === 0) {
                document.getElementById('contentView').innerHTML = '<div class="empty">暂无消息</div>';
                return;
            }
            renderDetail(resp);
        }).catch(function(e) {
            document.getElementById('contentView').innerHTML = '<div class="error">加载失败: ' + esc(String(e)) + '</div>';
        });
    }

    function main() {
        // Back button (createElement required per experience.md)
        var backBtn = document.createElement('button');
        backBtn.className = 'back-btn';
        backBtn.textContent = '← 返回';
        backBtn.addEventListener('click', function() {
            showList();
            loadList();
        });
        document.getElementById('detailHeaderLeft').appendChild(backBtn);

        showList();
        loadList();
    }

    // 立即检查 SDK，已就绪则跳过轮询延迟
    if (window.AstrBotPluginPage) { main(); } else {
        var tries = 0;
        var timer = setInterval(function() {
            tries++;
            if (window.AstrBotPluginPage) {
                clearInterval(timer);
                main();
            } else if (tries > 80) {
                clearInterval(timer);
                document.getElementById('contentView').innerHTML =
                    '<div class="error">SDK 加载超时，请刷新重试</div>';
            }
        }, 100);
    }
})();
</script>
</html>
