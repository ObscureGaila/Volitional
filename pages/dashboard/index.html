<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volitional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 40px 24px; min-height: 100vh; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 24px; margin-bottom: 6px; }
        .hero p { color: #888; font-size: 14px; }
        .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; max-width: 600px; margin: 0 auto; }
        .card { background: #16213e; border-radius: 12px; padding: 32px 24px; cursor: pointer; border: 2px solid #0f3460; flex: 1; min-width: 240px; transition: border-color .2s, transform .2s; }
        .card:hover { border-color: #00b894; transform: translateY(-2px); }
        .card .icon { font-size: 36px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin-bottom: 8px; }
        .card p { font-size: 13px; color: #888; line-height: 1.5; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .back-bar { display: none; padding: 8px 0 16px; }
        .back-bar.active { display: flex; align-items: center; }
        .back-btn { background: #0f3460; color: #eee; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .back-btn:hover { background: #1a4a7a; }
    </style>
</head>
<body>
    <div id="homeView">
        <div class="hero">
            <h1>🎯 随心所动 Volitional</h1>
            <p>智能判断回复时机，让 Bot 更自然地参与对话</p>
        </div>
        <div class="cards" id="cards"></div>
    </div>
    <div class="back-bar" id="backBar">
        <button class="back-btn" id="btnBack">← 返回主页</button>
    </div>
    <div class="page-content" id="pageContent"></div>
</body>
<script>
(function() {
    var container = document.getElementById('cards');
    var homeView = document.getElementById('homeView');
    var pageContent = document.getElementById('pageContent');
    var backBar = document.getElementById('backBar');

    function loadPage(page) {
        pageContent.style.display = 'flex';
        pageContent.style.flexDirection = 'column';
        pageContent.style.height = '100vh';
        pageContent.innerHTML = '<div style="text-align:center;color:#636e72;padding:40px;">加载中...</div>';
        pageContent.classList.add('active');
        homeView.style.display = 'none';
        backBar.classList.add('active');

        AstrBotPluginPage.apiGet('/page_content', { page: page }).then(function(resp) {
            if (resp && resp.html) {
                pageContent.innerHTML = resp.html;
                runPageScripts(pageContent);
            } else {
                pageContent.innerHTML = '<div class="error" style="color:#e17055;text-align:center;padding:20px;">加载失败</div>';
            }
        }).catch(function(e) {
            pageContent.innerHTML = '<div class="error" style="color:#e17055;text-align:center;padding:20px;">加载失败: ' + String(e) + '</div>';
        });
    }

    function runPageScripts(container) {
        var scripts = container.querySelectorAll('script');
        scripts.forEach(function(s) {
            var newScript = document.createElement('script');
            if (s.src) { newScript.src = s.src; }
            else { newScript.textContent = s.textContent; }
            s.parentNode.replaceChild(newScript, s);
        });
    }

    function showHome() {
        homeView.style.display = 'block';
        pageContent.classList.remove('active');
        pageContent.style.display = '';
        pageContent.style.flexDirection = '';
        pageContent.style.height = '';
        pageContent.innerHTML = '';
        backBar.classList.remove('active');
    }

    function main() {
        function makeCard(icon, title, desc, page) {
            var div = document.createElement('div');
            div.className = 'card';
            var iconDiv = document.createElement('div'); iconDiv.className = 'icon'; iconDiv.textContent = icon; div.appendChild(iconDiv);
            var h2 = document.createElement('h2'); h2.textContent = title; div.appendChild(h2);
            var p = document.createElement('p'); p.textContent = desc; div.appendChild(p);
            div.addEventListener('click', function() { loadPage(page); });
            return div;
        }
        container.appendChild(makeCard('📊', '判断日志', '查看每条消息的回复判断结果、评分详情和冷却状态', 'log'));
        container.appendChild(makeCard('💬', '聊天记录', '按群聊/私聊查看历史消息，仿 QQ 聊天界面', 'messages'));

        document.getElementById('btnBack').addEventListener('click', showHome);
    }

    // 立即检查 SDK，已就绪则跳过轮询延迟
    if (window.AstrBotPluginPage) { main(); } else {
        var tries = 0;
        var timer = setInterval(function() { tries++; if (window.AstrBotPluginPage) { clearInterval(timer); main(); } else if (tries > 80) { clearInterval(timer); main(); } }, 100);
    }
})();
</script>
</html>
