<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volitional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 40px 24px; min-height: 100vh; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 24px; margin-bottom: 6px; }
        .hero p { color: #888; font-size: 14px; }
        .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; max-width: 600px; margin: 0 auto; }
        .card { background: #16213e; border-radius: 12px; padding: 32px 24px; border: 2px solid #0f3460; flex: 1; min-width: 240px; }
        .card .icon { font-size: 36px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin-bottom: 8px; }
        .card p { font-size: 13px; color: #888; line-height: 1.5; }
        .tip { text-align: center; color: #636e72; font-size: 13px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🎯 随心所动 Volitional</h1>
        <p>智能判断回复时机，让 Bot 更自然地参与对话</p>
    </div>
    <div class="cards">
        <div class="card">
            <div class="icon">📊</div>
            <h2>判断日志</h2>
            <p>查看每条消息的回复判断结果、评分详情和冷却状态</p>
        </div>
        <div class="card">
            <div class="icon">💬</div>
            <h2>聊天记录</h2>
            <p>按群聊/私聊查看历史消息，仿 QQ 聊天界面</p>
        </div>
    </div>
    <p class="tip">👆 点击顶部标签页切换功能</p>
</body>
</html>
